name: Synthetic Health Check

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Run synthetic check
        id: synthetic
        env:
          BACKEND_URL: ${{ vars.PROD_BACKEND_URL || 'https://helpdesk-saas-production-0cd0.up.railway.app' }}
          FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL || 'https://helpdesk-two-livid.vercel.app' }}
          HEALTHCHECK_TIMEOUT_MS: ${{ vars.SYNTHETIC_HEALTHCHECK_TIMEOUT_MS || '10000' }}
          HEALTHCHECK_RETRIES: ${{ vars.SYNTHETIC_HEALTHCHECK_RETRIES || '2' }}
          HEALTHCHECK_RETRY_DELAY_MS: ${{ vars.SYNTHETIC_HEALTHCHECK_RETRY_DELAY_MS || '1500' }}
          MAX_BACKEND_LATENCY_MS: ${{ vars.SYNTHETIC_MAX_BACKEND_LATENCY_MS || '4000' }}
          MAX_FRONTEND_LATENCY_MS: ${{ vars.SYNTHETIC_MAX_FRONTEND_LATENCY_MS || '6000' }}
          SYNTHETIC_OUTPUT_FILE: synthetic-output.json
        run: |
          node scripts/synthetic-health-check.mjs | tee synthetic-output.log

      - name: Publish synthetic summary
        if: always()
        run: |
          node -e "const fs=require('fs');const summary=process.env.GITHUB_STEP_SUMMARY;const p='synthetic-output.json';const lines=['## Synthetic Health Check'];if(fs.existsSync(p)){const d=JSON.parse(fs.readFileSync(p,'utf8'));lines.push('');lines.push(`- status: **${d.status}**`);lines.push(`- commit: \`${d.commitSha}\``);lines.push(`- backend live: ${d.checks.backendLiveMs}ms (attempts: ${d.attempts.backendLive})`);lines.push(`- backend ready: ${d.checks.backendReadyMs}ms (attempts: ${d.attempts.backendReady})`);lines.push(`- backend version: ${d.checks.backendVersionMs}ms (attempts: ${d.attempts.backendVersion})`);lines.push(`- frontend root: ${d.checks.frontendRootMs}ms (attempts: ${d.attempts.frontendRoot})`);} else {lines.push('');lines.push('- status: **error** (no JSON output generated)');}fs.appendFileSync(summary, lines.join('\n') + '\n');"

      - name: Upload synthetic result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-health-result
          path: |
            synthetic-output.json
            synthetic-output.log
          if-no-files-found: warn

  notify-on-failure:
    needs: monitor
    if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Open/update incident issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Incident] Synthetic Health Check failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Synthetic Health Check falhou.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              `- Time (UTC): ${new Date().toISOString()}`,
              '',
              'Acoes sugeridas:',
              '1. Verificar logs do workflow.',
              '2. Validar /health/live, /health e /health/version.',
              '3. Validar latencia e disponibilidade do frontend.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const incident = issues.find((i) => i.title === title);
            if (incident) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                body: `Nova falha detectada em ${new Date().toISOString()}\n\nRun: ${runUrl}`,
              });
              core.info(`Issue existente atualizada: #${incident.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'monitoring'],
              });
              core.info(`Issue criada: #${created.number}`);
            }

  notify-on-recovery:
    needs: monitor
    if: ${{ success() && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close incident issue on recovery
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Incident] Synthetic Health Check failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const incident = issues.find((i) => i.title === title);
            if (!incident) {
              core.info('Nenhum incidente aberto para fechar.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: incident.number,
              body: `Recuperacao detectada em ${new Date().toISOString()}\n\nRun: ${runUrl}`,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: incident.number,
              state: 'closed',
            });

            core.info(`Issue fechada: #${incident.number}`);
