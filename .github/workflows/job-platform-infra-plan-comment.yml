name: Job Platform Infra Plan (PR Comment)

on:
  pull_request:
    paths:
      - 'job-platform/infra/**'
      - '.github/workflows/job-platform-infra-plan-comment.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform fmt (check)
        working-directory: job-platform/infra
        run: terraform fmt -check -recursive

      - name: Plan staging
        id: plan_staging
        working-directory: job-platform/infra/environments/staging
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform init -backend=false
          terraform plan -no-color -out=tfplan \
            -var="api_image_tag=pr-${{ github.sha }}" \
            -var="worker_image_tag=pr-${{ github.sha }}"
          terraform show -json tfplan > plan.json
          node - <<'NODE'
          const fs = require('fs');
          const plan = JSON.parse(fs.readFileSync('plan.json','utf8'));
          const changes = plan.resource_changes || [];
          const by = {create: [], update: [], delete: [], replace: [], noop: []};
          for (const rc of changes) {
            const a = (rc.change && rc.change.actions) || [];
            const addr = rc.address;
            const key = a.join(',');
            if (key === 'create') by.create.push(addr);
            else if (key === 'update') by.update.push(addr);
            else if (key === 'delete') by.delete.push(addr);
            else if (key === 'create,delete') by.replace.push(addr);
            else by.noop.push(addr);
          }
          const pick = (arr, n=30) => arr.slice(0,n);
          const lines = [];
          lines.push(`create: ${by.create.length}`);
          lines.push(`update: ${by.update.length}`);
          lines.push(`delete: ${by.delete.length}`);
          lines.push(`replace: ${by.replace.length}`);
          for (const [k, arr] of Object.entries(by)) {
            if (k === 'noop' || arr.length === 0) continue;
            lines.push('');
            lines.push(`${k} (first ${Math.min(arr.length,30)}):`);
            for (const a of pick(arr)) lines.push(`- ${a}`);
          }
          fs.writeFileSync('plan-summary.txt', lines.join('\n'));
          NODE

      - name: Plan prod
        id: plan_prod
        working-directory: job-platform/infra/environments/prod
        env:
          TF_IN_AUTOMATION: 'true'
        run: |
          terraform init -backend=false
          terraform plan -no-color -out=tfplan \
            -var="api_image_tag=pr-${{ github.sha }}" \
            -var="worker_image_tag=pr-${{ github.sha }}"
          terraform show -json tfplan > plan.json
          node - <<'NODE'
          const fs = require('fs');
          const plan = JSON.parse(fs.readFileSync('plan.json','utf8'));
          const changes = plan.resource_changes || [];
          const by = {create: [], update: [], delete: [], replace: [], noop: []};
          for (const rc of changes) {
            const a = (rc.change && rc.change.actions) || [];
            const addr = rc.address;
            const key = a.join(',');
            if (key === 'create') by.create.push(addr);
            else if (key === 'update') by.update.push(addr);
            else if (key === 'delete') by.delete.push(addr);
            else if (key === 'create,delete') by.replace.push(addr);
            else by.noop.push(addr);
          }
          const pick = (arr, n=30) => arr.slice(0,n);
          const lines = [];
          lines.push(`create: ${by.create.length}`);
          lines.push(`update: ${by.update.length}`);
          lines.push(`delete: ${by.delete.length}`);
          lines.push(`replace: ${by.replace.length}`);
          for (const [k, arr] of Object.entries(by)) {
            if (k === 'noop' || arr.length === 0) continue;
            lines.push('');
            lines.push(`${k} (first ${Math.min(arr.length,30)}):`);
            for (const a of pick(arr)) lines.push(`- ${a}`);
          }
          fs.writeFileSync('plan-summary.txt', lines.join('\n'));
          NODE

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const staging = fs.readFileSync('job-platform/infra/environments/staging/plan-summary.txt', 'utf8');
            const prod = fs.readFileSync('job-platform/infra/environments/prod/plan-summary.txt', 'utf8');
            const body = [
              '## Job Platform Terraform plan (no backend)',
              '',
              'This plan runs with `terraform init -backend=false` (no remote state).',
              '',
              '### staging',
              '```',
              staging.trim(),
              '```',
              '',
              '### prod',
              '```',
              prod.trim(),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
