name: Job Platform CI

on:
  push:
    paths:
      - 'job-platform/package.json'
      - 'job-platform/package-lock.json'
      - 'job-platform/tsconfig*.json'
      - 'job-platform/.nvmrc'
      - 'job-platform/.npmrc'
      - 'job-platform/packages/**'
      - '.github/workflows/job-platform-ci.yml'
  pull_request:
    paths:
      - 'job-platform/package.json'
      - 'job-platform/package-lock.json'
      - 'job-platform/tsconfig*.json'
      - 'job-platform/.nvmrc'
      - 'job-platform/.npmrc'
      - 'job-platform/packages/**'
      - '.github/workflows/job-platform-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: job-platform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: job-platform/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
